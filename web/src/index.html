<!doctype html>
<html lang="en" class="is-preloader-open">
  <head>
    <title>RASVS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="RASVS: RAG focused on OWASP ASVS—cited answers from the standard."
    />
    <meta name="theme-color" content="#5D3136" />
    <meta property="og:title" content="RASVS" />
    <meta
      property="og:description"
      content="RASVS: RAG focused on OWASP ASVS—cited answers from the standard."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/thumbnail.png" />
    <meta property="og:image:alt" content="RASVS" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RASVS" />
    <meta
      name="twitter:description"
      content="RASVS: RAG focused on OWASP ASVS—cited answers from the standard."
    />
    <meta name="twitter:image" content="/thumbnail.png" />
    <meta name="twitter:image:alt" content="RASVS" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                DEFAULT: "#5D3136",
                cream: "#FFE2C5",
              },
            },
            fontFamily: {
              sans: ['"Noto Sans"', "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>

    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/thumbnail.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body class="min-h-screen bg-brand font-sans text-brand-cream antialiased">
    <div id="bg-webgl" class="bg-webgl" aria-hidden="true"></div>
    <div
      id="site-preloader"
      class="site-preloader"
      role="status"
      aria-busy="true"
      aria-live="polite"
      aria-label="Loading"
    >
      <img
        src="/rasvs-1.svg"
        alt=""
        class="site-preloader__mark"
        width="355"
        height="77"
        decoding="async"
      />
    </div>
    <div class="site-content site-content--preloading">
      <section class="hero">
        <div class="container">
          <div class="photo-block js-anim-hero-photo">
            <img
              src="/rasvs.svg"
              class="photo"
              width="355"
              height="77"
              alt="RASVS"
            />
          </div>
          <div class="text-block">
            <div
              class="left-container"
              aria-busy="true"
              aria-label="Project details"
            ></div>
            <div class="right-container">
              <div class="links" aria-label="Project links"></div>
            </div>
          </div>
        </div>
      </section>
      <div
        id="rasvs-locale-mobile"
        class="container rasvs-locale-mobile"
        aria-label="Language"
      ></div>
      <section class="timber">
        <div class="container">
          <div class="left-container">
            <div class="text-block">
              <p class="desc-2">
                Coded by
                <a
                  href="https://whosramoss.com"
                  class="timber__credit-link"
                  target="_blank"
                  rel="noopener noreferrer"
                  >whosramoss</a
                >
              </p>
            </div>
          </div>
        </div>
      </section>
    </div>
    <script src="./scripts/rasvs-cms.js"></script>
    <script type="module" src="./scripts/rasvs-animation.js"></script>
    <script type="module" src="./scripts/rasvs-background.js"></script>
  </body>
</html>
